<!doctype html>
<html lang="tr">

    <meta name="google" content="notranslate" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <meta name="theme-color" content="#0b0b18" />
    <!-- Tell browsers the app is already dark so "auto/force dark mode"
         (Chrome Android, Samsung Internet, MIUI…) doesn't re-invert our colors. -->
    <meta name="color-scheme" content="dark" />
    <meta name="supported-color-schemes" content="dark" />
    <meta name="description" content="Harflere dokunarak süreye karşı Türkçe kelime yaz." />

    <!-- Open Graph / link previews (WhatsApp, iMessage, Telegram, Facebook…).
         Crawlers don't run JS, so these must be static and use absolute URLs. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="YazYaz" />
    <meta property="og:title" content="YazYaz — Arkadaşına meydan oku!" />
    <meta property="og:description" content="Harflere dokun, süreye karşı kelime yaz ve arkadaşını 1'e 1 yenmeye çalış. 🔥" />
    <meta property="og:url" content="https://umuterturk.github.io/word-rush/" />
    <meta property="og:image" content="https://umuterturk.github.io/word-rush/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="YazYaz — renkli harf blokları" />
    <meta property="og:locale" content="tr_TR" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="YazYaz — Arkadaşına meydan oku!" />
    <meta name="twitter:description" content="Harflere dokun, süreye karşı kelime yaz ve arkadaşını 1'e 1 yenmeye çalış. 🔥" />
    <meta name="twitter:image" content="https://umuterturk.github.io/word-rush/og-image.png" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="YazYaz" />
    <title>YazYaz</title>
